#Enable or disable vein mining globally
veinMiningEnabled = true
#Hunger cost per block broken via vein mining (0.0 to 2.0)
# Default: 0.1
# Range: 0.0 ~ 2.0
hungerDrainPerBlock = 0.1
#Maximum blocks per vein operation (100 = safe default, -1 = unlimited but DANGEROUS)
# Default: 100
# Range: -1 ~ 100000
maxBlocksPerVein = 100
#Search radius for connected blocks (1 = 3x3x3 cube)
# Default: 1
# Range: 1 ~ 3
searchRadius = 1
#Enable delay between breaking blocks (true = 80000 tick delay per block, false = instant)
delayEnabled = true
